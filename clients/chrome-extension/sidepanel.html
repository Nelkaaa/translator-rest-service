<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Darija Translator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        h2 { color: #333; }
        textarea {
            width: 100%;
            height: 100px;
            margin: 10px 0;
            padding: 8px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover { background: #45a049; }
        #result {
            margin-top: 20px;
            padding: 10px;
            background: white;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 16px;
            direction: rtl;
        }
        #status { color: gray; font-size: 12px; }
    </style>
</head>
<body>
    <h2>Darija Translator</h2>
    <label>Text to translate:</label>
    <textarea id="inputText" placeholder="Enter text here..."></textarea>
    <button id="translateBtn">Translate</button>
    <p id="status"></p>
    <div id="result"></div>
    <script src="sidepanel.js"></script>
</body>
</html>
